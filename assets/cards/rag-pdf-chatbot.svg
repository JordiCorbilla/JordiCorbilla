  </defs>
  <rect x="10" y="10" rx="18" ry="18" width="400" height="170" fill="url(#g-rag-pdf-chatbot)" stroke="#2b3140" filter="url(#shadow-rag-pdf-chatbot)"/>
  <rect x="24" y="24" rx="6" ry="6" width="8" height="28" fill="#50fa7b"/>
  <text x="46" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#50fa7b" font-weight="700">RAG-PDF-Chatbot</text>
  <text x="24" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#b8c1d1" letter-spacing="1.2">JORDICORBILLA / RAG-PDF-CHATBOT</text>
  <text x="24" y="80" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#b8c1d1">Retrieval-augmented chatbot over PDF</text><text x="24" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#b8c1d1">content with practical UX focus.</text>
