<svg xmlns="http://www.w3.org/2000/svg" width="420" height="190" viewBox="0 0 420 190" role="img" aria-label="RAG-PDF-Chatbot">
  <defs>
    <linearGradient id="g-rag-pdf-chatbot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f29"/>
      <stop offset="100%" stop-color="#171b24"/>
    </linearGradient>
    <filter id="shadow-rag-pdf-chatbot" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.28"/>
